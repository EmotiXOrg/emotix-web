name: Web Release Gate

on:
  push:
    branches: ["release/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: web-release-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release metadata
        run: node scripts/validate-release-metadata.mjs release.json

      - name: Quality gate
        run: |
          npm run lint
          npm run typecheck
          npm run test
          npm run build:prod
